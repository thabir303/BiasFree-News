[pytest]
# ─── Test Discovery ────────────────────────────────────────────────────────
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# asyncio mode: 'strict' means only @pytest.mark.asyncio tests use asyncio
# This prevents event loop conflicts when TestClient is used in sync tests
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function

# ─── Output ────────────────────────────────────────────────────────────────
addopts =
    -v
    --tb=short
    --strict-markers
    --cov=app
    --cov-report=term-missing
    --cov-report=html:tests/coverage_report/html
    --cov-report=xml:tests/coverage_report/coverage.xml
    --cov-config=.coveragerc

# ─── Markers ───────────────────────────────────────────────────────────────
markers =
    unit: Unit tests (no external I/O)
    integration: Integration tests (use TestClient/DB)
    slow: Slow tests (skipped in fast CI)
