name: Daily Scrape
on:
  schedule:
    - cron: '0 0 * * *'  # 6 AM BDT = 00:00 UTC
  workflow_dispatch:

jobs:
  trigger-scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger scraping
        run: |
          curl -X POST https://biasfree-news-srhf.onrender.com/api/scrape/trigger \
            -H "Authorization: Bearer ${{ secrets.ADMIN_TOKEN }}"